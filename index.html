#submit-btn:hover{color:#fff;border-color:#aaa}
#msg{font-size:14px;letter-spacing:2px;color:#777;margin-top:16px;text-align:center;min-height:18px}

<script>
const cursor=document.getElementById('cursor');
const period=document.getElementById('period');
const nut=document.getElementById('nut');
const msg=document.getElementById('msg');
const btn=document.getElementById('submit-btn');

document.addEventListener('mousemove',e=>{
  cursor.style.left=e.clientX+'px';
  cursor.style.top=e.clientY+'px';
});
document.addEventListener('mouseover',()=>cursor.style.opacity='1');
document.addEventListener('mouseleave',()=>cursor.style.opacity='0');

const canvas=document.getElementById('noise');
const ctx=canvas.getContext('2d');
function drawNoise(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  const img=ctx.createImageData(canvas.width,canvas.height);
  for(let i=0;i<img.data.length;i+=4){
    const v=Math.random()*255;
    img.data[i]=img.data[i+1]=img.data[i+2]=v;
    img.data[i+3]=15;
  }
  ctx.putImageData(img,0,0);
  setTimeout(drawNoise,80);
}
drawNoise();

setTimeout(()=>{document.getElementById('line1').style.opacity='1';document.getElementById('line1').style.transform='translateY(0)'},500);
setTimeout(()=>{document.getElementById('line2').style.opacity='1';document.getElementById('line2').style.transform='translateY(0)'},800);
setTimeout(()=>{document.getElementById('line3').style.opacity='1'},1300);
setTimeout(()=>{document.getElementById('divider').style.height='44px'},1500);
setTimeout(()=>{document.getElementById('countdown').style.opacity='1'},2100);

function updateCountdown(){
  const target=new Date('2026-06-05T00:00:00+09:00');
  const now=new Date();
  const diff=target-now;
  if(diff<=0){
    document.getElementById('cd-days').textContent='00';
    document.getElementById('cd-hours').textContent='00';
    document.getElementById('cd-mins').textContent='00';
    document.getElementById('cd-secs').textContent='00';
    return;
  }
  const d=Math.floor(diff/86400000);
  const h=Math.floor((diff%86400000)/3600000);
  const m=Math.floor((diff%3600000)/60000);
  const s=Math.floor((diff%60000)/1000);
  document.getElementById('cd-days').textContent=String(d).padStart(2,'0');
  document.getElementById('cd-hours').textContent=String(h).padStart(2,'0');
  document.getElementById('cd-mins').textContent=String(m).padStart(2,'0');
  document.getElementById('cd-secs').textContent=String(s).padStart(2,'0');
}
updateCountdown();
setInterval(updateCountdown,1000);
setTimeout(()=>{document.getElementById('form-area').style.opacity='1';document.getElementById('form-area').style.transform='translateY(0)'},2400);
setTimeout(()=>{document.getElementById('social').style.opacity='1'},2800);
setTimeout(()=>{document.getElementById('cookie-notice').style.opacity='1'},3200);

let periodOn=false;
setInterval(()=>{
  periodOn=!periodOn;
  period.style.color=periodOn?'#fff':'#555';
},3400);

function randomGlitch(){
  setTimeout(()=>{
    nut.classList.add('glitch');
    setTimeout(()=>nut.classList.remove('glitch'),120);
    randomGlitch();
  },5000+Math.random()*7000);
}
setTimeout(randomGlitch,4000);

btn.addEventListener('click',()=>{
  const val=document.getElementById('email-input').value.trim();
  if(!val||!val.includes('@')){
    msg.style.color='#777';
    msg.textContent='enter a valid email.';
    return;
  }
  document.getElementById('mc-email').value=val;
  document.getElementById('mc-submit').click();
  msg.style.color='#888';
  msg.textContent="we'll run to you.";
  document.getElementById('email-input').value='';
});
document.getElementById('email-input').addEventListener('keydown',e=>{
  if(e.key==='Enter')btn.click();
});
</script>
