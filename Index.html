
<style>
html,body{background:#0a0a0a !important;margin:0;padding:0}
*{margin:0;padding:0;box-sizing:border-box}
#wrap{background:#0a0a0a;min-height:700px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px 100px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;cursor:none;overflow:hidden;position:relative}
#cursor{position:absolute;width:6px;height:6px;background:#fff;border-radius:50%;pointer-events:none;transform:translate(-50%,-50%);z-index:100;opacity:0;transition:opacity 0.3s}
#noise{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:0.018}
#hero{text-align:center;z-index:2;position:relative;width:100%;display:flex;flex-direction:column;align-items:center}
#line1{font-size:22px;letter-spacing:5px;color:#888;text-transform:lowercase;opacity:0;transform:translateY(8px);transition:opacity 0.8s,transform 0.8s}
#line1 .cap{text-transform:uppercase}
#line2{font-size:clamp(90px,16vw,160px);font-weight:800;color:#fff;line-height:1;letter-spacing:-4px;margin:36px 0 16px;opacity:0;transform:translateY(14px);transition:opacity 0.9s 0.3s,transform 0.9s 0.3s}
#nut{display:inline-block}
#period{color:#555}
#line3{font-size:20px;letter-spacing:8px;color:#777;text-transform:lowercase;opacity:0;transition:opacity 1s 0.9s}
#divider{width:1px;height:0;background:#444;margin:48px auto;transition:height 1.2s 1.1s}
#sub{font-size:20px;letter-spacing:6px;color:#777;text-transform:lowercase;opacity:0;transition:opacity 0.8s 2s;margin-bottom:40px}
#form-area{opacity:0;transform:translateY(8px);transition:opacity 0.8s 2.2s,transform 0.8s 2.2s;width:100%;max-width:500px;display:flex;flex-direction:column;align-items:center}
#email-row{display:flex;width:100%;justify-content:center}
#email-input{flex:1;background:transparent;border:0.5px solid #666;border-right:none;color:#fff;font-size:18px;letter-spacing:1.5px;padding:18px 22px;outline:none;font-family:inherit;transition:border-color 0.4s}
#email-input::placeholder{color:#666}
#email-input:focus{border-color:#888}
#submit-btn{background:transparent;border:0.5px solid #666;color:#888;font-size:14px;letter-spacing:3px;padding:18px 28px;cursor:pointer;font-family:inherit;transition:all 0.4s;white-space:nowrap}
#submit-btn:hover{color:#fff;border-color:#aaa}
#msg{font-size:14px;letter-spacing:2px;color:#777;margin-top:16px;text-align:center;min-height:18px}
#social{display:flex;gap:28px;margin-top:48px;opacity:0;transition:opacity 0.8s 2.8s;z-index:2}
#social a{display:flex;align-items:center;justify-content:center;opacity:0.4;transition:opacity 0.3s}
#social a:hover{opacity:1}
#social svg{width:22px;height:22px;fill:#fff}
#footer{position:absolute;bottom:0;left:0;right:0;padding:20px 24px;display:flex;flex-direction:column;align-items:center;gap:6px;opacity:0;transition:opacity 0.8s 3.2s;z-index:2;border-top:0.5px solid #1e1e1e}
#footer-main{font-size:11px;letter-spacing:4px;color:#555;text-transform:lowercase}
#footer-sub{font-size:10px;letter-spacing:2px;color:#333;text-transform:lowercase;display:flex;gap:20px;align-items:center}
#footer-sub a{color:#333;text-decoration:none;transition:color 0.3s}
#footer-sub a:hover{color:#777}
.dot{color:#222}
.glitch{animation:glitch 0.12s linear}
@keyframes glitch{0%{transform:translateX(0) skewX(0)}25%{transform:translateX(4px) skewX(3deg)}50%{transform:translateX(-3px)}75%{transform:translateX(2px)}100%{transform:translateX(0)}}
</style>

    <div id="footer-main">donut-run.com &nbsp;·&nbsp; running brand</div>

<script>
const wrap=document.getElementById('wrap');
const cursor=document.getElementById('cursor');
const period=document.getElementById('period');
const nut=document.getElementById('nut');
const msg=document.getElementById('msg');
const btn=document.getElementById('submit-btn');

wrap.addEventListener('mousemove',e=>{
  const r=wrap.getBoundingClientRect();
  cursor.style.left=(e.clientX-r.left)+'px';
  cursor.style.top=(e.clientY-r.top)+'px';
});
wrap.addEventListener('mouseenter',()=>cursor.style.opacity='1');
wrap.addEventListener('mouseleave',()=>cursor.style.opacity='0');

const canvas=document.getElementById('noise');
const ctx=canvas.getContext('2d');
function drawNoise(){
  canvas.width=wrap.offsetWidth;
  canvas.height=wrap.offsetHeight;
  const img=ctx.createImageData(canvas.width,canvas.height);
  for(let i=0;i<img.data.length;i+=4){
    const v=Math.random()*255;
    img.data[i]=img.data[i+1]=img.data[i+2]=v;
    img.data[i+3]=15;
  }
  ctx.putImageData(img,0,0);
  setTimeout(drawNoise,80);
}
drawNoise();

setTimeout(()=>{document.getElementById('line1').style.opacity='1';document.getElementById('line1').style.transform='translateY(0)'},500);
setTimeout(()=>{document.getElementById('line2').style.opacity='1';document.getElementById('line2').style.transform='translateY(0)'},800);
setTimeout(()=>{document.getElementById('line3').style.opacity='1'},1300);
setTimeout(()=>{document.getElementById('divider').style.height='44px'},1500);
setTimeout(()=>{document.getElementById('sub').style.opacity='1'},2100);
setTimeout(()=>{document.getElementById('form-area').style.opacity='1';document.getElementById('form-area').style.transform='translateY(0)'},2400);
setTimeout(()=>{document.getElementById('social').style.opacity='1'},2800);
setTimeout(()=>{document.getElementById('footer').style.opacity='1'},3200);

let periodOn=false;
setInterval(()=>{
  periodOn=!periodOn;
  period.style.color=periodOn?'#fff':'#555';
},3400);

function randomGlitch(){
  setTimeout(()=>{
    nut.classList.add('glitch');
    setTimeout(()=>nut.classList.remove('glitch'),120);
    randomGlitch();
  },5000+Math.random()*7000);
}
setTimeout(randomGlitch,4000);

btn.addEventListener('click',()=>{
  const val=document.getElementById('email-input').value.trim();
  if(!val||!val.includes('@')){
    msg.style.color='#777';
    msg.textContent='enter a valid email.';
    return;
  }
  msg.style.color='#888';
  msg.textContent="we'll run to you.";
  document.getElementById('email-input').value='';
});
document.getElementById('email-input').addEventListener('keydown',e=>{
  if(e.key==='Enter')btn.click();
});
</script>
